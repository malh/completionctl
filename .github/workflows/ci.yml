name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runner: the integration tests drive a real interactive zsh.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -l . && test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: make test
